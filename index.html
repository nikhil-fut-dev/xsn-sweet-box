<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <title>Action | E-Commerce & platform</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="navLogin.css">
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="whatsapp-popup.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="productCart.css">
</head>

<body>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <header>
        <div class="header-left">
            <div class="logo">
                <a href="index.html">
                    <img src="action-logo3.png" alt="">
                </a>
            </div>

            <div class="header-address">
                <h3>Dilvery in 24 hours</h3>
                <p>72FM+C7G, Durgakund, Varanasi</p>
            </div>
        </div>
        <form class="search-box">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
            <input type="text">
        </form>

        <div class="header-btn">
            <button class="menu-toggle" onclick="toggleMenu()">Login</button>
            <button class="cart-icon" onclick="toggleCart()"><i class="fa-solid fa-cart-shopping"></i> My Cart<span
                    class="cart-count" id="cartCount">0</span></button>
        </div>
    </header>

    <nav id="navMenu">
        <a href="#" onclick="closeAll()">Home</a>
        <a href="#" onclick="closeAll()">Sweet Boxes</a>
        <a href="#" onclick="closeAll()">Serving Plates</a>
        <a href="#" onclick="closeAll()">Combo Offers</a>
    </nav>

    <div class="cart-panel" id="cartPanel">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>
        <h3>Total: ₹<span id="total">0</span></h3>
    </div>

    <section class="bannerSection">
        <img src="Frame-1437256605-2-2.jpg" alt="">
    </section>

    <div class="popup" id="whatsapp-popup">
        <span class="close-btn" onclick="closePopup()">✖</span>
        <h3>Contact Us</h3>
        <form onsubmit="submitForm(event)">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="tel" id="phone" placeholder="Your Phone" required>
            <input type="email" id="email" placeholder="abc@gmail.com" required>
            <textarea id="message" placeholder="Your Message" required></textarea>
            <button class="btn" type="submit">Send Message</button>
        </form>
    </div>

    <button class="floating-btn" onclick="openPopup()"><i class="fa-brands fa-whatsapp"></i></button>

    <script src="productCart-navLogin.js"></script>
    <script src="form.js"></script>
    <script src="whatsapp-popup.js"></script>
    <script src="footer.js"></script>

</body>

</html>
